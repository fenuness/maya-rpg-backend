services:
  mysql:
    image: mysql:8
    container_name: maya_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: maya_rpg
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: maya_api
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql://root:123456@mysql:3306/maya_rpg
      PORT: 3002

volumes:
  mysql_data: